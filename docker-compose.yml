services:
  db:
    image: mysql:8.4
    container_name: chaturanga-db
    environment:
      MYSQL_ROOT_PASSWORD: chaturanga
      MYSQL_USER: chaturanga
      MYSQL_PASSWORD: chaturanga
      MYSQL_DATABASE: chaturanga
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pchaturanga"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: chaturanga-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chaturanga-backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "mysql+pymysql://chaturanga:chaturanga@db:3306/chaturanga?charset=utf8mb4"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
      DEBUG: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chaturanga-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      HOST: "0.0.0.0"
      WDS_SOCKET_PORT: "3000"
      REACT_APP_API_URL: "http://localhost:8000"

volumes:
  mysql_data:
